<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Uvulalala - Vocal Tract Modeler</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #12151f; color: #c8cad8;
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    display: flex; justify-content: center; align-items: center;
    padding: 20px; overflow-x: hidden;
  }
  .app-frame {
    width: 100%; max-width: 620px;
    background: linear-gradient(145deg, #1e2233 0%, #181b28 50%, #1a1e2d 100%);
    border-radius: 24px; padding: 24px 24px 20px;
    box-shadow: 0 4px 60px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,255,255,0.04), inset 0 1px 0 rgba(255,255,255,0.05);
  }
  .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; padding: 0 4px; }
  .top-bar h1 { font-size: 26px; font-weight: 700; color: #e8eaf0; letter-spacing: -0.5px; }
  .sparkle-icon { width: 28px; height: 28px; opacity: 0.6; color: #c8cad8; }
  .sparkle-icon svg { width: 100%; height: 100%; }
  .viewport-wrap {
    width: 100%; aspect-ratio: 900 / 667;
    border-radius: 12px; overflow: hidden; position: relative;
    border: 1px solid rgba(255,255,255,0.06);
    box-shadow: inset 0 0 40px rgba(0,0,0,0.3), 0 2px 20px rgba(0,0,0,0.3);
    cursor: grab; background: #000;
  }
  .viewport-wrap:active { cursor: grabbing; }
  .viewport-bg { width:100%; height:100%; object-fit:cover; display:block; position:absolute; top:0; left:0; pointer-events:none; }
  canvas#overlayCanvas { position:absolute; top:0; left:0; width:100%; height:100%; }
  .punch-btn {
    position:absolute; bottom:14px; right:14px; width:42px; height:42px;
    border-radius:50%; border:1.5px solid rgba(255,255,255,0.15);
    background:rgba(30,34,50,0.7); backdrop-filter:blur(10px);
    color:#d0d2e0; font-size:18px; cursor:pointer;
    display:flex; align-items:center; justify-content:center;
    transition:all 0.15s; z-index:10;
  }
  .punch-btn:hover { background:rgba(60,65,90,0.8); border-color:rgba(255,255,255,0.25); transform:scale(1.08); }
  .punch-btn:active { transform:scale(0.92); }
  .controls {
    margin-top:14px;
    background:linear-gradient(135deg,rgba(30,34,50,0.8) 0%,rgba(25,28,42,0.9) 100%);
    border:1px solid rgba(255,255,255,0.06); border-radius:14px;
    padding:18px 22px 14px; backdrop-filter:blur(12px);
  }
  .controls-title { font-family:'Space Mono',monospace; font-size:10px; letter-spacing:5px; color:rgba(180,185,210,0.45); margin-bottom:14px; text-transform:uppercase; }
  .params-grid { display:grid; grid-template-columns:1fr 1fr; gap:11px 36px; }
  .param-row { display:flex; align-items:center; gap:10px; }
  .param-label { font-size:13px; font-weight:600; color:rgba(200,205,225,0.75); min-width:72px; }
  .param-slider { flex:1; -webkit-appearance:none; appearance:none; height:4px; border-radius:2px; background:rgba(255,255,255,0.08); outline:none; cursor:pointer; }
  .param-slider::-webkit-slider-thumb { -webkit-appearance:none; width:15px; height:15px; border-radius:50%; cursor:pointer; border:none; box-shadow:0 1px 6px rgba(0,0,0,0.4); }
  .param-slider.s-length::-webkit-slider-thumb{background:#d4968a}
  .param-slider.s-width::-webkit-slider-thumb{background:#a8b0c8}
  .param-slider.s-stiffness::-webkit-slider-thumb{background:#e8a040}
  .param-slider.s-damping::-webkit-slider-thumb{background:#e870a0}
  .param-slider.s-nasality::-webkit-slider-thumb{background:#9888d8}
  .param-slider.s-trillrate::-webkit-slider-thumb{background:#40a8e8}
  .param-slider.s-trilldepth::-webkit-slider-thumb{background:#40d0a0}
  .param-slider.s-length{background:linear-gradient(to right,#d4968a var(--pct,63%),rgba(255,255,255,0.08) var(--pct,63%))}
  .param-slider.s-width{background:linear-gradient(to right,#a8b0c8 var(--pct,44%),rgba(255,255,255,0.08) var(--pct,44%))}
  .param-slider.s-stiffness{background:linear-gradient(to right,#e8a040 var(--pct,50%),rgba(255,255,255,0.08) var(--pct,50%))}
  .param-slider.s-damping{background:linear-gradient(to right,#e870a0 var(--pct,50%),rgba(255,255,255,0.08) var(--pct,50%))}
  .param-slider.s-nasality{background:linear-gradient(to right,#9888d8 var(--pct,20%),rgba(255,255,255,0.08) var(--pct,20%))}
  .param-slider.s-trillrate{background:linear-gradient(to right,#40a8e8 var(--pct,0%),rgba(255,255,255,0.08) var(--pct,0%))}
  .param-slider.s-trilldepth{background:linear-gradient(to right,#40d0a0 var(--pct,0%),rgba(255,255,255,0.08) var(--pct,0%))}
  .param-value{font-family:'Space Mono',monospace;font-size:12px;min-width:26px;text-align:right}
  .pv-length{color:#d4968a}.pv-width{color:#a8b0c8}.pv-stiffness{color:#e8a040}
  .pv-damping{color:#e870a0}.pv-nasality{color:#9888d8}.pv-trillrate{color:#40a8e8}.pv-trilldepth{color:#40d0a0}
  .hint{text-align:center;font-family:'Space Mono',monospace;font-size:10px;color:rgba(180,185,210,0.3);letter-spacing:0.8px;margin-top:14px}
  @media(max-width:500px){.params-grid{grid-template-columns:1fr;gap:8px}.app-frame{padding:16px;border-radius:18px}.top-bar h1{font-size:22px}}
</style>
</head>

  <div class="hint" id="hintText">click anywhere to enable audio &bull; drag uvula to play &bull; punch for glottal stop</div>
</div>

<script>
const canvas = document.getElementById('overlayCanvas');
const ctx = canvas.getContext('2d');
const viewport = document.getElementById('viewport');
const bgImg = document.getElementById('bgImg');

let W, H, dpr;
function resize() {
  dpr = window.devicePixelRatio || 1;
  const rect = canvas.getBoundingClientRect();
  W = rect.width * dpr;
  H = rect.height * dpr;
  canvas.width = W;
  canvas.height = H;
}
resize();
window.addEventListener('resize', resize);

const P = { length:155, width:60, stiffness:50, damping:50, nasality:50, trillRate:50, trillDepth:50 };
let angle = 0, vel = 0, dragging = false, dragX = 0, dragY = 0;

const SL = [
  ['pLength','vLength','length',60,250],['pWidth','vWidth','width',20,100],
  ['pStiffness','vStiffness','stiffness',0,100],['pDamping','vDamping','damping',0,100],
  ['pNasality','vNasality','nasality',0,100],['pTrillRate','vTrillRate','trillRate',0,100],
  ['pTrillDepth','vTrillDepth','trillDepth',0,100]
];
function uf(s,a,b){s.style.setProperty('--pct',((s.value-a)/(b-a))*100+'%');}
SL.forEach(([si,vi,k,a,b])=>{const s=document.getElementById(si),v=document.getElementById(vi);uf(s,a,b);s.addEventListener('input',()=>{P[k]=+s.value;v.textContent=s.value;uf(s,a,b);});});

function mapPointer(px, py) {
  const rect = viewport.getBoundingClientRect();
  // X position → width (20-100), mapped across viewport
  const xNorm = Math.max(0, Math.min(1, (px - rect.left) / rect.width));
  P.width = 20 + xNorm * 80;
  document.getElementById('pWidth').value = P.width;
  document.getElementById('vWidth').textContent = Math.round(P.width);
  uf(document.getElementById('pWidth'), 20, 100);
  // Y position → length (60-250), mapped across viewport
  const yNorm = Math.max(0, Math.min(1, (py - rect.top) / rect.height));
  P.length = 60 + yNorm * 190;
  document.getElementById('pLength').value = P.length;
  document.getElementById('vLength').textContent = Math.round(P.length);
  uf(document.getElementById('pLength'), 60, 250);
}
viewport.addEventListener('mousedown',e=>{if(e.target.closest('.punch-btn'))return;dragging=true;mapPointer(e.clientX,e.clientY);viewport.style.cursor='grabbing';});
window.addEventListener('mousemove',e=>{if(!dragging)return;mapPointer(e.clientX,e.clientY);});
window.addEventListener('mouseup',()=>{dragging=false;viewport.style.cursor='grab';});
viewport.addEventListener('touchstart',e=>{if(e.target.closest('.punch-btn'))return;dragging=true;mapPointer(e.touches[0].clientX,e.touches[0].clientY);},{passive:true});
window.addEventListener('touchmove',e=>{if(!dragging)return;mapPointer(e.touches[0].clientX,e.touches[0].clientY);},{passive:true});
window.addEventListener('touchend',()=>{dragging=false;});
document.getElementById('punchBtn').addEventListener('click',()=>{vel+=(Math.random()-0.5)*2.5;});

// Offscreen buffer for the uvula — lets us do layered compositing
const uvBuf = document.createElement('canvas');
const uc = uvBuf.getContext('2d');

// Pre-build noise texture for tissue grain
const noiseC = document.createElement('canvas');
noiseC.width = 128; noiseC.height = 128;
const nc = noiseC.getContext('2d');
const nid = nc.createImageData(128,128);
for(let i=0;i<nid.data.length;i+=4){const v=Math.random()*255;nid.data[i]=v;nid.data[i+1]=v;nid.data[i+2]=v;nid.data[i+3]=18;}
nc.putImageData(nid,0,0);

// Patch canvas to cover static uvula
let patchReady = false;
const patchC = document.createElement('canvas');
const pc = patchC.getContext('2d');

function buildPatch() {
  if (!bgImg.naturalWidth) return;
  const iw = bgImg.naturalWidth, ih = bgImg.naturalHeight;
  patchC.width = iw; patchC.height = ih;
  pc.drawImage(bgImg, 0, 0);

  // Clone clean palate tissue over the static uvula
  // Left palate patch
  pc.drawImage(bgImg, iw*0.28, ih*0.10, iw*0.10, ih*0.14,
    iw*0.45, ih*0.10, iw*0.10, ih*0.12);
  // Mirrored
  pc.save(); pc.translate(iw*0.55, 0); pc.scale(-1,1);
  pc.drawImage(bgImg, iw*0.28, ih*0.12, iw*0.10, ih*0.12,
    0, ih*0.12, iw*0.10, ih*0.12);
  pc.restore();
  // Right side tissue
  pc.drawImage(bgImg, iw*0.62, ih*0.22, iw*0.09, ih*0.16,
    iw*0.45, ih*0.22, iw*0.10, ih*0.16);
  // Throat dark
  pc.drawImage(bgImg, iw*0.36, ih*0.50, iw*0.08, ih*0.12,
    iw*0.44, ih*0.36, iw*0.12, ih*0.16);
  // More throat coverage
  pc.save(); pc.translate(iw*0.56, 0); pc.scale(-1,1);
  pc.drawImage(bgImg, iw*0.36, ih*0.50, iw*0.08, ih*0.12,
    0, ih*0.38, iw*0.12, ih*0.14);
  pc.restore();

  patchReady = true;
}
bgImg.addEventListener('load', buildPatch);
if (bgImg.complete) buildPatch();

// ========== PHOTOREALISTIC UVULA RENDERER ==========
function drawUvula(t, cx, uvulaTopY, uvulaLen, uvulaW, swingX) {
  const tipX = cx + swingX;
  const tipY = uvulaTopY + uvulaLen;
  const bulbR = uvulaW * 1.1; // bulbous tip radius

  // Build the uvula path — smooth teardrop with distinct stalk and bulb
  function uvulaPath(c, inflate) {
    const inf = inflate || 0;
    const stalkW = uvulaW * 0.38 + inf;
    const midW = uvulaW * 0.85 + inf;
    const tipR = bulbR + inf;
    const stalkTop = uvulaTopY;
    const neckY = uvulaTopY + uvulaLen * 0.25;
    const bulgeY = uvulaTopY + uvulaLen * 0.6;
    const bTipY = tipY + tipR * 0.4;

    // Swing-interpolated x positions
    const neckX = cx + swingX * 0.35;
    const bulgeX = cx + swingX * 0.7;

    c.beginPath();
    // Left side: stalk top -> neck -> bulge -> tip
    c.moveTo(cx - stalkW, stalkTop);
    c.bezierCurveTo(
      cx - stalkW + swingX*0.1, stalkTop + uvulaLen*0.12,
      neckX - midW, neckY - uvulaLen*0.05,
      neckX - midW, neckY
    );
    c.bezierCurveTo(
      neckX - midW*1.05, neckY + uvulaLen*0.15,
      bulgeX - tipR*1.15, bulgeY,
      tipX - tipR*0.3, bTipY - tipR*0.5
    );
    // Round tip
    c.bezierCurveTo(
      tipX - tipR*0.6, bTipY + tipR*0.3,
      tipX + tipR*0.6, bTipY + tipR*0.3,
      tipX + tipR*0.3, bTipY - tipR*0.5
    );
    // Right side back up
    c.bezierCurveTo(
      bulgeX + tipR*1.15, bulgeY,
      neckX + midW*1.05, neckY + uvulaLen*0.15,
      neckX + midW, neckY
    );
    c.bezierCurveTo(
      neckX + midW, neckY - uvulaLen*0.05,
      cx + stalkW + swingX*0.1, stalkTop + uvulaLen*0.12,
      cx + stalkW, stalkTop
    );
    c.closePath();
  }

  // --- LAYER 1: Drop shadow ---
  ctx.save();
  ctx.globalAlpha = 0.5;
  ctx.filter = 'blur(' + (6*dpr) + 'px)';
  ctx.translate(4*dpr, 8*dpr);
  uvulaPath(ctx);
  ctx.fillStyle = '#0a0204';
  ctx.fill();
  ctx.filter = 'none';
  ctx.restore();

  // --- LAYER 2: Base flesh ---
  ctx.save();
  uvulaPath(ctx);
  const baseG = ctx.createLinearGradient(tipX - uvulaW*1.5, uvulaTopY, tipX + uvulaW*0.8, tipY + bulbR);
  baseG.addColorStop(0, '#d8a098');
  baseG.addColorStop(0.15, '#d09488');
  baseG.addColorStop(0.3, '#c48478');
  baseG.addColorStop(0.5, '#b87468');
  baseG.addColorStop(0.7, '#ac6458');
  baseG.addColorStop(0.85, '#9c5448');
  baseG.addColorStop(1, '#8c4438');
  ctx.fillStyle = baseG;
  ctx.fill();
  ctx.restore();

  // --- LAYER 3: Vertical depth gradient (darker at top stalk, lighter mid-body) ---
  ctx.save();
  uvulaPath(ctx);
  ctx.clip();
  const depthG = ctx.createLinearGradient(0, uvulaTopY, 0, tipY + bulbR);
  depthG.addColorStop(0, 'rgba(80,30,25,0.4)');
  depthG.addColorStop(0.15, 'rgba(80,30,25,0.15)');
  depthG.addColorStop(0.35, 'rgba(200,130,110,0.05)');
  depthG.addColorStop(0.6, 'rgba(0,0,0,0)');
  depthG.addColorStop(0.85, 'rgba(60,20,18,0.15)');
  depthG.addColorStop(1, 'rgba(50,15,12,0.35)');
  ctx.fillStyle = depthG;
  ctx.fillRect(tipX - uvulaW*2, uvulaTopY, uvulaW*4, uvulaLen + bulbR*2);
  ctx.restore();

  // --- LAYER 4: 3D volume — radial highlight on the bulb center ---
  ctx.save();
  uvulaPath(ctx);
  ctx.clip();
  const bulbCX = tipX - uvulaW*0.15;
  const bulbCY = tipY - uvulaLen*0.05;
  const volG = ctx.createRadialGradient(bulbCX, bulbCY, 0, bulbCX, bulbCY, bulbR*1.8);
  volG.addColorStop(0, 'rgba(230,165,145,0.5)');
  volG.addColorStop(0.25, 'rgba(215,140,120,0.25)');
  volG.addColorStop(0.5, 'rgba(200,120,100,0.08)');
  volG.addColorStop(1, 'transparent');
  ctx.fillStyle = volG;
  ctx.fillRect(tipX - uvulaW*3, uvulaTopY, uvulaW*6, uvulaLen + bulbR*2);
  ctx.restore();

  // --- LAYER 5: Subsurface scattering (warm glow from within) ---
  ctx.save();
  uvulaPath(ctx);
  ctx.clip();
  const sssG = ctx.createRadialGradient(
    tipX - uvulaW*0.3, uvulaTopY + uvulaLen*0.45, 0,
    tipX, uvulaTopY + uvulaLen*0.4, uvulaW*2.5
  );
  sssG.addColorStop(0, 'rgba(250,170,150,0.3)');
  sssG.addColorStop(0.3, 'rgba(235,140,115,0.15)');
  sssG.addColorStop(0.6, 'rgba(210,110,90,0.05)');
  sssG.addColorStop(1, 'transparent');
  ctx.fillStyle = sssG;
  ctx.fillRect(tipX - uvulaW*3, uvulaTopY, uvulaW*6, uvulaLen + bulbR*2);
  ctx.restore();

  // --- LAYER 6: Left specular highlight (main wet reflection) ---
  ctx.save();
  uvulaPath(ctx);
  ctx.clip();
  // Elongated highlight running down the left side
  const specX = tipX - uvulaW*0.35;
  const specTopY = uvulaTopY + uvulaLen*0.08;
  const specBotY = tipY - uvulaLen*0.05;
  const specG = ctx.createLinearGradient(specX - uvulaW*0.5, 0, specX + uvulaW*0.3, 0);
  specG.addColorStop(0, 'rgba(255,255,255,0)');
  specG.addColorStop(0.3, 'rgba(255,225,210,0.35)');
  specG.addColorStop(0.5, 'rgba(255,235,220,0.45)');
  specG.addColorStop(0.7, 'rgba(255,225,210,0.2)');
  specG.addColorStop(1, 'rgba(255,255,255,0)');
  ctx.fillStyle = specG;
  ctx.beginPath();
  ctx.ellipse(specX, (specTopY+specBotY)/2, uvulaW*0.4, (specBotY-specTopY)/2, -0.1 + angle*0.15, 0, Math.PI*2);
  ctx.fill();
  ctx.restore();

  // --- LAYER 7: Small bright specular dot (pinpoint light reflection) ---
  ctx.save();
  uvulaPath(ctx);
  ctx.clip();
  const dotX = tipX - uvulaW*0.25;
  const dotY = uvulaTopY + uvulaLen*0.32;
  const dotG = ctx.createRadialGradient(dotX, dotY, 0, dotX, dotY, uvulaW*0.35);
  dotG.addColorStop(0, 'rgba(255,245,240,0.6)');
  dotG.addColorStop(0.3, 'rgba(255,230,220,0.2)');
  dotG.addColorStop(1, 'transparent');
  ctx.fillStyle = dotG;
  ctx.fillRect(dotX - uvulaW, dotY - uvulaW, uvulaW*2, uvulaW*2);
  ctx.restore();

  // --- LAYER 8: Right edge shadow (volume contour) ---
  ctx.save();
  uvulaPath(ctx);
  ctx.clip();
  const edgeSX = tipX + uvulaW*0.4;
  const edgeSG = ctx.createLinearGradient(edgeSX - uvulaW*0.4, 0, edgeSX + uvulaW*0.6, 0);
  edgeSG.addColorStop(0, 'transparent');
  edgeSG.addColorStop(0.4, 'rgba(70,25,20,0.15)');
  edgeSG.addColorStop(0.7, 'rgba(50,18,15,0.25)');
  edgeSG.addColorStop(1, 'rgba(40,12,10,0.35)');
  ctx.fillStyle = edgeSG;
  ctx.beginPath();
  ctx.ellipse(edgeSX, uvulaTopY + uvulaLen*0.5, uvulaW*0.6, uvulaLen*0.55, 0.1 + angle*0.1, 0, Math.PI*2);
  ctx.fill();
  ctx.restore();

  // --- LAYER 9: Tissue grain / surface texture ---
  ctx.save();
  uvulaPath(ctx);
  ctx.clip();
  ctx.globalAlpha = 0.06;
  const pat = ctx.createPattern(noiseC, 'repeat');
  ctx.fillStyle = pat;
  ctx.fillRect(tipX - uvulaW*3, uvulaTopY, uvulaW*6, uvulaLen + bulbR*2);
  ctx.restore();

  // --- LAYER 10: Subtle veins ---
  ctx.save();
  uvulaPath(ctx);
  ctx.clip();
  ctx.globalAlpha = 0.045;
  ctx.strokeStyle = '#602028';
  ctx.lineWidth = 0.8 * dpr;
  const veinSeed = Math.floor(t / 5000) * 5000; // stable seed that changes slowly
  const rng = (function(s){return function(){s=(s*9301+49297)%233280;return s/233280;};})(veinSeed);
  for (let i = 0; i < 12; i++) {
    const va = rng() * Math.PI * 2;
    const vr = uvulaW * (0.3 + rng() * 1.0);
    const vox = tipX + (rng()-0.5)*uvulaW*0.5;
    const voy = uvulaTopY + uvulaLen*0.2 + rng()*uvulaLen*0.5;
    ctx.beginPath();
    ctx.moveTo(vox, voy);
    ctx.quadraticCurveTo(
      vox + Math.cos(va)*vr*0.5 + (rng()-0.5)*12,
      voy + Math.sin(va)*vr*0.5 + (rng()-0.5)*12,
      vox + Math.cos(va)*vr,
      voy + Math.sin(va)*vr
    );
    ctx.stroke();
  }
  ctx.restore();

  // --- LAYER 11: Purple/blue rim light (matching reference image lighting) ---
  ctx.save();
  ctx.globalAlpha = 0.14;
  ctx.strokeStyle = '#9080e0';
  ctx.lineWidth = 2 * dpr;
  ctx.filter = 'blur(' + (1.5*dpr) + 'px)';
  uvulaPath(ctx);
  ctx.stroke();
  ctx.filter = 'none';
  ctx.restore();

  // --- LAYER 12: Pink/magenta secondary rim ---
  ctx.save();
  ctx.globalAlpha = 0.08;
  ctx.strokeStyle = '#d870b0';
  ctx.lineWidth = 2.5 * dpr;
  ctx.filter = 'blur(' + (2*dpr) + 'px)';
  uvulaPath(ctx, 1.5*dpr);
  ctx.stroke();
  ctx.filter = 'none';
  ctx.restore();

  // --- LAYER 13: Animated saliva glisten spots ---
  ctx.save();
  uvulaPath(ctx);
  ctx.clip();
  ctx.globalAlpha = 0.2 + Math.sin(t*0.003)*0.06;
  for (let i = 0; i < 7; i++) {
    const gx = tipX + (Math.sin(i*2.7+t*0.0008)-0.5)*uvulaW*0.5;
    const gy = uvulaTopY + uvulaLen*0.1 + i*uvulaLen*0.11;
    const gr = (0.6 + Math.sin(i*1.9+t*0.002)*0.3) * dpr;
    const gg = ctx.createRadialGradient(gx, gy, 0, gx, gy, gr*4);
    gg.addColorStop(0, 'rgba(255,240,235,0.65)');
    gg.addColorStop(0.4, 'rgba(255,230,220,0.15)');
    gg.addColorStop(1, 'transparent');
    ctx.fillStyle = gg;
    ctx.beginPath();
    ctx.arc(gx, gy, gr*4, 0, Math.PI*2);
    ctx.fill();
  }
  ctx.restore();

  // --- LAYER 14: Wet film sheen overlay ---
  ctx.save();
  uvulaPath(ctx);
  ctx.clip();
  ctx.globalAlpha = 0.06 + Math.sin(t*0.001)*0.02;
  const sheenG = ctx.createLinearGradient(tipX - uvulaW, uvulaTopY, tipX + uvulaW*0.5, tipY);
  sheenG.addColorStop(0, 'rgba(255,240,235,0.3)');
  sheenG.addColorStop(0.3, 'rgba(255,235,225,0.1)');
  sheenG.addColorStop(0.5, 'rgba(255,230,220,0.02)');
  sheenG.addColorStop(1, 'transparent');
  ctx.fillStyle = sheenG;
  ctx.fillRect(tipX - uvulaW*2, uvulaTopY, uvulaW*4, uvulaLen + bulbR);
  ctx.restore();
}

// Stalk connection to palate
function drawStalk(cx, uvulaTopY, uvulaW, swingX) {
  ctx.save();
  const stG = ctx.createLinearGradient(0, uvulaTopY - H*0.035, 0, uvulaTopY + H*0.015);
  stG.addColorStop(0, 'rgba(175,95,85,0.0)');
  stG.addColorStop(0.3, 'rgba(185,105,92,0.5)');
  stG.addColorStop(0.6, 'rgba(195,115,100,0.8)');
  stG.addColorStop(1, 'rgba(200,120,105,0.95)');
  ctx.fillStyle = stG;
  const stalkW = uvulaW * 0.65;
  ctx.beginPath();
  ctx.moveTo(cx - stalkW*1.4, uvulaTopY - H*0.03);
  ctx.quadraticCurveTo(cx - stalkW*0.8 + swingX*0.1, uvulaTopY - H*0.005, cx - stalkW*0.38 + swingX*0.15, uvulaTopY + H*0.005);
  ctx.lineTo(cx + stalkW*0.38 + swingX*0.15, uvulaTopY + H*0.005);
  ctx.quadraticCurveTo(cx + stalkW*0.8 + swingX*0.1, uvulaTopY - H*0.005, cx + stalkW*1.4, uvulaTopY - H*0.03);
  ctx.closePath();
  ctx.fill();

  // Ambient occlusion at attachment
  const aoG = ctx.createRadialGradient(cx + swingX*0.1, uvulaTopY, 0, cx, uvulaTopY, stalkW*2);
  aoG.addColorStop(0, 'rgba(50,15,12,0.35)');
  aoG.addColorStop(0.5, 'rgba(50,15,12,0.1)');
  aoG.addColorStop(1, 'transparent');
  ctx.fillStyle = aoG;
  ctx.beginPath();
  ctx.ellipse(cx + swingX*0.1, uvulaTopY - H*0.005, stalkW*2, H*0.02, 0, 0, Math.PI*2);
  ctx.fill();
  ctx.restore();
}

// ========== WEB AUDIO THROAT SYNTH ==========
let actx = null, audioStarted = false;

// Audio nodes
let glottalOsc, glottalGain, subOsc, subGain;
let formants = []; // {bp, gain}
let nasalBP, nasalGain, nasalComb1, nasalComb2;
let tremoloLFO, tremoloGain, pitchLFO, pitchLFOGain;
let waveshaper, masterGain, compressor, convolver, toneFilter;
let noiseSource, noiseBuf, noiseGain;
let breathNoise, breathGain, breathFilter;
let phlegmDelay1, phlegmDelay2, phlegmLFO1, phlegmLFO2, phlegmFeedback, phlegmGain, phlegmFilter, phlegmLFOGain1, phlegmLFOGain2;

function createNoiseBuffer(ctx, duration) {
  const len = ctx.sampleRate * duration;
  const buf = ctx.createBuffer(1, len, ctx.sampleRate);
  const data = buf.getChannelData(0);
  // Brownian-ish noise for throaty texture
  let v = 0;
  for (let i = 0; i < len; i++) {
    v += (Math.random() - 0.5) * 0.12;
    v *= 0.998;
    data[i] = v + (Math.random() - 0.5) * 0.3;
  }
  return buf;
}

function createThroatIR(ctx) {
  // Synthesize a short "throat cavity" impulse response
  const len = ctx.sampleRate * 0.08; // 80ms
  const buf = ctx.createBuffer(2, len, ctx.sampleRate);
  for (let ch = 0; ch < 2; ch++) {
    const d = buf.getChannelData(ch);
    for (let i = 0; i < len; i++) {
      const t = i / ctx.sampleRate;
      // Multiple resonant decays at throat-like frequencies
      d[i] = (
        Math.sin(2 * Math.PI * 280 * t) * Math.exp(-t * 60) * 0.3 +
        Math.sin(2 * Math.PI * 750 * t) * Math.exp(-t * 45) * 0.2 +
        Math.sin(2 * Math.PI * 2400 * t) * Math.exp(-t * 80) * 0.1 +
        (Math.random() - 0.5) * Math.exp(-t * 100) * 0.05
      ) * (ch === 0 ? 1 : 0.95); // slight stereo
    }
  }
  return buf;
}

function makeDistortionCurve(amount) {
  const k = amount;
  const samples = 44100;
  const curve = new Float32Array(samples);
  const deg = Math.PI / 180;
  for (let i = 0; i < samples; i++) {
    const x = (i * 2) / samples - 1;
    // Subharmonic fold-back waveshaping
    curve[i] = Math.tanh(k * x) * 0.7 + Math.sin(Math.PI * x * k * 0.3) * 0.3;
  }
  return curve;
}

function initAudio() {
  if (audioStarted) return;
  actx = new (window.AudioContext || window.webkitAudioContext)();
  audioStarted = true;

  // === GLOTTAL SOURCE: sawtooth-ish oscillator (vocal fold buzz) ===
  glottalOsc = actx.createOscillator();
  glottalOsc.type = 'sawtooth';
  glottalOsc.frequency.value = 120;

  glottalGain = actx.createGain();
  glottalGain.gain.value = 0;

  // === SUB OSCILLATOR: one octave below for chest rumble ===
  subOsc = actx.createOscillator();
  subOsc.type = 'triangle';
  subOsc.frequency.value = 60;

  subGain = actx.createGain();
  subGain.gain.value = 0;

  // === NOISE SOURCE: aspirant breath component ===
  noiseBuf = createNoiseBuffer(actx, 2);
  noiseSource = actx.createBufferSource();
  noiseSource.buffer = noiseBuf;
  noiseSource.loop = true;

  noiseGain = actx.createGain();
  noiseGain.gain.value = 0;

  // Breath noise (higher, airier)
  breathNoise = actx.createBufferSource();
  breathNoise.buffer = noiseBuf;
  breathNoise.loop = true;
  breathGain = actx.createGain();
  breathGain.gain.value = 0;
  breathFilter = actx.createBiquadFilter();
  breathFilter.type = 'bandpass';
  breathFilter.frequency.value = 2500;
  breathFilter.Q.value = 0.7;

  // === WAVESHAPER: subharmonic generation ===
  waveshaper = actx.createWaveShaper();
  waveshaper.curve = makeDistortionCurve(3);
  waveshaper.oversample = '4x';

  // === FORMANT FILTER BANK ===
  // F1-F5 approximate open throat "ahhh" position
  const formantFreqs = [700, 1200, 2600, 3300, 4500];
  const formantQs =    [12,  10,   8,    7,    6   ];
  const formantGains = [1.0, 0.7,  0.45, 0.3,  0.15];

  const formantMerge = actx.createGain();
  formantMerge.gain.value = 1.0;

  formants = formantFreqs.map((f, i) => {
    const bp = actx.createBiquadFilter();
    bp.type = 'bandpass';
    bp.frequency.value = f;
    bp.Q.value = formantQs[i];
    const g = actx.createGain();
    g.gain.value = formantGains[i];
    bp.connect(g);
    g.connect(formantMerge);
    return { bp, gain: g, baseFreq: f, baseQ: formantQs[i], baseGain: formantGains[i] };
  });

  // === NASAL RESONANCE PATH ===
  nasalBP = actx.createBiquadFilter();
  nasalBP.type = 'bandpass';
  nasalBP.frequency.value = 270;
  nasalBP.Q.value = 5;

  // Comb filter effect via short delays (nasal cavity simulation)
  nasalComb1 = actx.createDelay(0.02);
  nasalComb1.delayTime.value = 0.0045;
  nasalComb2 = actx.createDelay(0.02);
  nasalComb2.delayTime.value = 0.0078;

  const nasalFeedback1 = actx.createGain();
  nasalFeedback1.gain.value = 0.4;
  const nasalFeedback2 = actx.createGain();
  nasalFeedback2.gain.value = 0.3;

  nasalGain = actx.createGain();
  nasalGain.gain.value = 0;

  // Wire nasal path with comb feedback
  nasalBP.connect(nasalComb1);
  nasalComb1.connect(nasalFeedback1);
  nasalFeedback1.connect(nasalComb1); // feedback loop
  nasalComb1.connect(nasalComb2);
  nasalComb2.connect(nasalFeedback2);
  nasalFeedback2.connect(nasalComb2); // feedback loop
  nasalComb2.connect(nasalGain);

  // === PHLEGM: wet gurgling chorus/flanger ===
  // Two modulated delay lines with feedback for bubbly, mucousy texture
  phlegmDelay1 = actx.createDelay(0.05);
  phlegmDelay1.delayTime.value = 0.007;
  phlegmDelay2 = actx.createDelay(0.05);
  phlegmDelay2.delayTime.value = 0.013;

  // LFOs to modulate delay times (creates the churning/gurgling)
  phlegmLFO1 = actx.createOscillator();
  phlegmLFO1.type = 'sine';
  phlegmLFO1.frequency.value = 0.8; // slow churn
  phlegmLFOGain1 = actx.createGain();
  phlegmLFOGain1.gain.value = 0; // modulation depth, controlled by phlegm amount

  phlegmLFO2 = actx.createOscillator();
  phlegmLFO2.type = 'triangle';
  phlegmLFO2.frequency.value = 1.3; // slightly different rate for complexity
  phlegmLFOGain2 = actx.createGain();
  phlegmLFOGain2.gain.value = 0;

  phlegmLFO1.connect(phlegmLFOGain1);
  phlegmLFOGain1.connect(phlegmDelay1.delayTime);
  phlegmLFO2.connect(phlegmLFOGain2);
  phlegmLFOGain2.connect(phlegmDelay2.delayTime);

  // Feedback loop for the sticky, recirculating gurgle
  phlegmFeedback = actx.createGain();
  phlegmFeedback.gain.value = 0;

  // Resonant filter in the feedback path — makes it throaty not metallic
  phlegmFilter = actx.createBiquadFilter();
  phlegmFilter.type = 'bandpass';
  phlegmFilter.frequency.value = 800;
  phlegmFilter.Q.value = 2;

  phlegmGain = actx.createGain();
  phlegmGain.gain.value = 0;

  // Phlegm signal path: input → delay1 → delay2 → filter → feedback → delay1
  phlegmDelay1.connect(phlegmDelay2);
  phlegmDelay2.connect(phlegmFilter);
  phlegmFilter.connect(phlegmFeedback);
  phlegmFeedback.connect(phlegmDelay1); // recirculate
  phlegmDelay2.connect(phlegmGain); // wet output

  phlegmLFO1.start();
  phlegmLFO2.start();

  // === TREMOLO / TRILL LFO ===
  tremoloLFO = actx.createOscillator();
  tremoloLFO.type = 'sine';
  tremoloLFO.frequency.value = 0;

  tremoloGain = actx.createGain();
  tremoloGain.gain.value = 0; // depth

  // Pitch vibrato LFO
  pitchLFO = actx.createOscillator();
  pitchLFO.type = 'sine';
  pitchLFO.frequency.value = 0;

  pitchLFOGain = actx.createGain();
  pitchLFOGain.gain.value = 0;

  // === THROAT REVERB ===
  convolver = actx.createConvolver();
  convolver.buffer = createThroatIR(actx);
  const reverbGain = actx.createGain();
  reverbGain.gain.value = 0.35;
  const dryGain = actx.createGain();
  dryGain.gain.value = 0.75;

  // === MASTER ===
  // Tone filter — nasality sweeps this from dark to bright
  toneFilter = actx.createBiquadFilter();
  toneFilter.type = 'lowpass';
  toneFilter.frequency.value = 2000;
  toneFilter.Q.value = 0.7;

  compressor = actx.createDynamicsCompressor();
  compressor.threshold.value = -20;
  compressor.knee.value = 10;
  compressor.ratio.value = 6;

  masterGain = actx.createGain();
  masterGain.gain.value = 0.6;

  // === SIGNAL ROUTING ===
  // Glottal source → waveshaper → formant filters
  glottalOsc.connect(glottalGain);
  glottalGain.connect(waveshaper);

  // Sub oscillator → formant filters
  subOsc.connect(subGain);
  subGain.connect(waveshaper);

  // Noise → formant filters
  noiseSource.connect(noiseGain);
  noiseGain.connect(waveshaper);

  // Breath noise path
  breathNoise.connect(breathFilter);
  breathFilter.connect(breathGain);

  // Waveshaper → all formants
  formants.forEach(f => {
    waveshaper.connect(f.bp);
  });

  // Also route to nasal path
  waveshaper.connect(nasalBP);

  // Tremolo LFO modulates formant merge gain
  tremoloLFO.connect(tremoloGain);
  tremoloGain.connect(masterGain.gain);

  // Pitch LFO modulates oscillator frequency
  pitchLFO.connect(pitchLFOGain);
  pitchLFOGain.connect(glottalOsc.frequency);
  pitchLFOGain.connect(subOsc.frequency);

  // Merge → dry/wet reverb → compressor → master
  const preMaster = actx.createGain();
  preMaster.gain.value = 1;

  // Feed formants into phlegm effect AND direct to preMaster
  formantMerge.connect(preMaster);
  formantMerge.connect(phlegmDelay1); // phlegm input
  phlegmGain.connect(preMaster);      // phlegm wet output
  nasalGain.connect(preMaster);
  breathGain.connect(preMaster);

  preMaster.connect(dryGain);
  preMaster.connect(convolver);
  convolver.connect(reverbGain);

  dryGain.connect(toneFilter);
  reverbGain.connect(toneFilter);
  toneFilter.connect(compressor);
  compressor.connect(masterGain);
  masterGain.connect(actx.destination);

  // Start all sources
  glottalOsc.start();
  subOsc.start();
  noiseSource.start();
  breathNoise.start();
  tremoloLFO.start();
  pitchLFO.start();

  document.getElementById('hintText').textContent =
    'drag uvula to play \u2022 sliders shape the voice \u2022 punch for glottal stop';
}

// Update audio params from visual state each frame
let prevDragging = false;
let audioActive = false;
let targetGlottalGain = 0;
let currentGlottalGain = 0;

function updateAudio(t) {
  if (!audioStarted || !actx) return;

  // Voice is active when dragging or recently punched
  const shouldSound = dragging || Math.abs(vel) > 0.02;

  // Smooth gain envelope
  targetGlottalGain = shouldSound ? 0.35 : 0;
  currentGlottalGain += (targetGlottalGain - currentGlottalGain) * 0.08;

  const now = actx.currentTime;

  // === PITCH: mapped from uvula length ===
  // Longer uvula = lower pitch (range: ~60Hz to ~220Hz)
  const lengthNorm = (P.length - 60) / (250 - 60); // 0..1
  const basePitch = 220 - lengthNorm * 160; // 220Hz down to 60Hz

  // Swing angle bends pitch (throat warping effect)
  const pitchBend = Math.sin(angle) * 15;
  const finalPitch = basePitch + pitchBend;

  glottalOsc.frequency.setTargetAtTime(finalPitch, now, 0.03);
  subOsc.frequency.setTargetAtTime(finalPitch * 0.5, now, 0.03);

  // === GLOTTAL GAINS ===
  glottalGain.gain.setTargetAtTime(currentGlottalGain, now, 0.02);
  subGain.gain.setTargetAtTime(currentGlottalGain * 0.25, now, 0.02);
  noiseGain.gain.setTargetAtTime(currentGlottalGain * 0.12, now, 0.02);

  // Breath noise scales with velocity (faster swing = more breath)
  const breathAmt = Math.min(Math.abs(vel) * 2, 0.3) * currentGlottalGain;
  breathGain.gain.setTargetAtTime(breathAmt, now, 0.02);

  // === STIFFNESS → harmonic richness ===
  // Higher stiffness = more distortion = brighter harmonics
  const stiffNorm = P.stiffness / 100;
  waveshaper.curve = makeDistortionCurve(1 + stiffNorm * 8);

  // === WIDTH → formant vowel shape ===
  const widthNorm = (P.width) / 100; // 0..1
  const swingNorm = Math.sin(angle); // -1..1

  // Vowel targets: [F1, F2, F3, F4, F5]
  const vowelEe = [280, 2300, 3000, 3500, 4800]; // closed/front (narrow)
  const vowelAh = [800, 1200, 2600, 3300, 4500]; // open (wide)
  const vowelOo = [350, 800,  2500, 3100, 4200]; // rounded/back

  formants.forEach((f, i) => {
    // Width blends eee→ahhh, swing pushes toward ooo
    const openness = widthNorm;
    const roundness = (1 - widthNorm) * Math.max(0, -swingNorm);

    let targetFreq = vowelAh[i] * openness +
                     vowelEe[i] * (1 - openness) * (1 - roundness) +
                     vowelOo[i] * roundness;

    targetFreq *= (1 + swingNorm * 0.1);

    const qMult = 0.4 + (1 - widthNorm) * 1.2; // narrow = tighter resonance
    f.bp.frequency.setTargetAtTime(targetFreq, now, 0.04);
    f.bp.Q.setTargetAtTime(f.baseQ * qMult, now, 0.04);
  });

  // === NASALITY → tone filter (low-to-high frequency sweep) ===
  const nasalNorm = P.nasality / 100; // 0=dark/muffled, 1=bright/nasal
  // Sweep lowpass from ~1900Hz (muffled) to 12kHz (wide open)
  const toneFreq = 1900 * Math.pow(6.3, nasalNorm); // exponential sweep
  toneFilter.frequency.setTargetAtTime(toneFreq, now, 0.04);
  // Slight resonance bump in the middle range for a nasal honk
  toneFilter.Q.setTargetAtTime(0.5 + Math.sin(nasalNorm * Math.PI) * 4, now, 0.04);

  // Nasal resonance path — fades in at higher nasality values
  nasalGain.gain.setTargetAtTime(currentGlottalGain * Math.max(0, nasalNorm - 0.4) * 0.4, now, 0.03);
  nasalBP.frequency.setTargetAtTime(220 + nasalNorm * 120 + pitchBend * 0.5, now, 0.05);

  // === DAMPING → decay and brightness ===
  const dampNorm = P.damping / 100;
  breathFilter.frequency.setTargetAtTime(1500 + (1 - dampNorm) * 3000, now, 0.05);

  // Trill controls swing speed/amplitude in physics, no separate audio effect
}

// Glottal stop (punch button) — violent impact that rings out
function glottalStop() {
  if (!audioStarted || !actx) return;
  initAudio(); // ensure audio is running even if this is first interaction
  const now = actx.currentTime;

  // --- PHASE 1: Impact transient (0-30ms) ---
  // Hard choke the voice
  glottalGain.gain.cancelScheduledValues(now);
  glottalGain.gain.setValueAtTime(0, now);
  // Explosive noise burst
  noiseGain.gain.cancelScheduledValues(now);
  noiseGain.gain.setValueAtTime(0.8, now);
  noiseGain.gain.exponentialRampToValueAtTime(0.3, now + 0.03);
  // Harsh breath burst
  breathGain.gain.cancelScheduledValues(now);
  breathGain.gain.setValueAtTime(0.6, now);

  // Smash formants to resonant extremes — high Q makes them ring
  formants.forEach((f, i) => {
    f.bp.frequency.cancelScheduledValues(now);
    f.bp.Q.cancelScheduledValues(now);
    // Slam to a tight resonant peak
    f.bp.Q.setValueAtTime(f.baseQ * 6, now);
    // Shift frequencies down hard (choked throat)
    f.bp.frequency.setValueAtTime(f.baseFreq * 0.4, now);
  });

  // Crank master briefly for the hit
  masterGain.gain.cancelScheduledValues(now);
  masterGain.gain.setValueAtTime(0.9, now);

  // --- PHASE 2: Ring out (30ms - 400ms) ---
  // Glottal comes back hard then decays — the "ringing" voice
  glottalGain.gain.setValueAtTime(0.5, now + 0.03);
  glottalGain.gain.exponentialRampToValueAtTime(0.25, now + 0.15);
  glottalGain.gain.exponentialRampToValueAtTime(0.08, now + 0.4);

  // Noise decays slower — wet splashy tail
  noiseGain.gain.exponentialRampToValueAtTime(0.15, now + 0.15);
  noiseGain.gain.exponentialRampToValueAtTime(0.02, now + 0.5);

  // Breath rings out
  breathGain.gain.exponentialRampToValueAtTime(0.2, now + 0.1);
  breathGain.gain.exponentialRampToValueAtTime(0.01, now + 0.6);

  // Formants sweep back up while ringing (throat opening back up)
  formants.forEach((f, i) => {
    const ringTime = 0.08 + i * 0.03; // stagger for more complex ring
    f.bp.Q.exponentialRampToValueAtTime(f.baseQ * 4, now + ringTime);
    f.bp.Q.exponentialRampToValueAtTime(f.baseQ * 1.5, now + 0.4);
    f.bp.frequency.exponentialRampToValueAtTime(f.baseFreq * 0.6, now + ringTime);
    f.bp.frequency.exponentialRampToValueAtTime(f.baseFreq * 0.9, now + 0.5);
  });

  // Master settles
  masterGain.gain.exponentialRampToValueAtTime(0.6, now + 0.3);

  // --- PHASE 3: Pitch drop during ring (gut-punch feel) ---
  const basePitch = glottalOsc.frequency.value;
  glottalOsc.frequency.cancelScheduledValues(now);
  glottalOsc.frequency.setValueAtTime(basePitch * 1.3, now); // pitch spikes up on impact
  glottalOsc.frequency.exponentialRampToValueAtTime(basePitch * 0.7, now + 0.2); // drops below
  glottalOsc.frequency.exponentialRampToValueAtTime(basePitch, now + 0.5); // settles back

  subOsc.frequency.cancelScheduledValues(now);
  subOsc.frequency.setValueAtTime(basePitch * 0.65, now);
  subOsc.frequency.exponentialRampToValueAtTime(basePitch * 0.35, now + 0.2);
  subOsc.frequency.exponentialRampToValueAtTime(basePitch * 0.5, now + 0.5);

  // Sub rumble swells in during ring
  subGain.gain.cancelScheduledValues(now);
  subGain.gain.setValueAtTime(0.05, now);
  subGain.gain.exponentialRampToValueAtTime(0.3, now + 0.1);
  subGain.gain.exponentialRampToValueAtTime(0.02, now + 0.6);

  // Nasality burst (impact resonates through nasal cavity)
  nasalGain.gain.cancelScheduledValues(now);
  nasalGain.gain.setValueAtTime(0.4, now + 0.02);
  nasalGain.gain.exponentialRampToValueAtTime(0.01, now + 0.5);

  // --- PHASE 4: Recovery (400ms+) ---
  setTimeout(() => {
    if (!actx) return;
    const t2 = actx.currentTime;
    // Let the normal updateAudio loop take back over smoothly
    glottalGain.gain.setTargetAtTime(currentGlottalGain, t2, 0.1);
    noiseGain.gain.setTargetAtTime(currentGlottalGain * 0.12, t2, 0.1);
    breathGain.gain.setTargetAtTime(0, t2, 0.15);
    subGain.gain.setTargetAtTime(currentGlottalGain * 0.25, t2, 0.1);
    nasalGain.gain.setTargetAtTime(0, t2, 0.1);
    masterGain.gain.setTargetAtTime(0.6, t2, 0.05);
  }, 600);
}

// Wire up audio start on first interaction (mousedown so it's ready during drag)
document.addEventListener('mousedown', () => initAudio(), { once: false });
document.addEventListener('touchstart', () => initAudio(), { once: false });

// Patch punch button to also trigger glottal stop
document.getElementById('punchBtn').addEventListener('click', glottalStop);

function drawFrame(t) {
  const depthNorm = P.trillDepth / 100;
  // Loosen the spring as depth increases so swing can go wide
  const stiffK = (0.02 + (P.stiffness/100)*0.08) * (1 - depthNorm * 0.85);
  const dampK = (0.9 - (P.damping/100)*0.15) * (1 - depthNorm * 0.15);
  // Auto-swing while held down — trill rate controls speed, trill depth controls amplitude
  const swingSpeed = 0.003 + (P.trillRate / 100) * 0.06;
  const swingForce = 0.008 + depthNorm * 0.3;
  if (dragging) vel += Math.sin(t * swingSpeed) * swingForce;
  vel += -angle * stiffK;
  vel *= dampK;
  angle += vel;

  ctx.clearRect(0, 0, W, H);

  // Cover the static uvula from the background image
  if (patchReady) {
    const iw = patchC.width, ih = patchC.height;
    const sx = Math.floor(iw*0.36), sy = Math.floor(ih*0.08);
    const sw = Math.floor(iw*0.28), sh = Math.floor(ih*0.56);
    const dx = W*0.36, dy = H*0.08, dw = W*0.28, dh = H*0.56;
    ctx.drawImage(patchC, sx, sy, sw, sh, dx, dy, dw, dh);

    // Feather edges
    ctx.save();
    ctx.globalCompositeOperation = 'destination-out';
    const fe = H*0.04;
    let g;
    g = ctx.createLinearGradient(0,dy,0,dy+fe); g.addColorStop(0,'rgba(0,0,0,1)'); g.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=g; ctx.fillRect(dx,dy,dw,fe);
    g = ctx.createLinearGradient(0,dy+dh-fe,0,dy+dh); g.addColorStop(0,'rgba(0,0,0,0)'); g.addColorStop(1,'rgba(0,0,0,1)');
    ctx.fillStyle=g; ctx.fillRect(dx,dy+dh-fe,dw,fe);
    g = ctx.createLinearGradient(dx,0,dx+fe,0); g.addColorStop(0,'rgba(0,0,0,1)'); g.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=g; ctx.fillRect(dx,dy,fe,dh);
    g = ctx.createLinearGradient(dx+dw-fe,0,dx+dw,0); g.addColorStop(0,'rgba(0,0,0,0)'); g.addColorStop(1,'rgba(0,0,0,1)');
    ctx.fillStyle=g; ctx.fillRect(dx+dw-fe,dy,fe,dh);
    ctx.restore();
  }

  const cx2 = W/2;
  const uvulaLen = (P.length / 250) * H * 0.32;
  const uvulaW = (0.4 + (P.width / 100) * 0.6) * W * 0.055;
  const uvulaTopY = H * 0.20;
  const swingX = Math.sin(angle) * uvulaLen * 0.55;

  drawStalk(cx2, uvulaTopY, uvulaW, swingX);
  drawUvula(t, cx2, uvulaTopY, uvulaLen, uvulaW, swingX);
}

function loop(t) { drawFrame(t); updateAudio(t); requestAnimationFrame(loop); }
requestAnimationFrame(loop);
</script>
</body>
